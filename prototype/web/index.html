// --- The board: a real hex pyramid that fills in during the draw ---
const PLAYER_COLORS = [
  "FBBF24", "E6194B", "3CB44B", "4363D8", "F58231", "911EB4",
  "42D4F4", "F032E6", "BFEF45", "469990", "9A6324", "800000", "000075",
];
// A player's color is the color of the board tile they FIRST land on (set
// from draw_assignment's node field), not an arbitrary player-id lookup --
// so a contestant's badge and every tile they ever hold, even after
// conquering elsewhere, all trace back to visibly the same color they
// started the show on. Falls back to id-based only if called before that
// player's node is known yet (shouldn't happen in practice).
let playerColorNode = {};
function playerColor(playerId) {
  const node = playerColorNode[playerId] ?? playerId;
  return PLAYER_COLORS[node % PLAYER_COLORS.length];
}
const SVG_NS = "http://www.w3.org/2000/svg";

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    pts.push([cx + r * Math.sin(angle), cy - r * Math.cos(angle)]);
  }
  return pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
}

function pyramidPositions() {
  // Sized at 76 (grown again from 60, which itself grew from an original
  // 46; the viewBox grew to match, 700x520 to 700x620) since the tiles
  // themselves were still reading as small even once the text on them hit
  // a good size -- this bump grows the hex shape itself while leaving the
  // font-size constants in fontSizeForLabel untouched, so the label text
  // doesn't grow further, just has visibly more tile around it.
  const size = 76, dx = Math.sqrt(3) * size, dy = 1.5 * size;
  const rows = [1, 2, 3, 4, 3];
  const cx = 350, cy = 92;
  const positions = [];
  rows.forEach((w, r) => {
    const y = cy + r * dy;
    for (let i = 0; i < w; i++) {
      const x = cx + (i - (w - 1) / 2) * dx;
      positions.push([x, y]);
    }
  });
  return { positions, size };
}

// Real touching hex-flower geometry for the consolidated (post-Scramble)
// board: a center hub plus up to six petals, each placed exactly one
// hex-width away so it visibly shares an edge with the hub, and
// consecutive petals share an edge with each other too, one connected,
// gapless mosaic rather than a sparse ring. Petal angles are the six true
// edge-touching directions for our pointy-top hex orientation (offset 30
// degrees from the tile's own vertex-at-top angle convention).
const SLOT_ANGLES_DEG = [270, 330, 30, 90, 150, 210];

function circularPositions(n) {
  // cy and the margins grew along with the taller 700x640 viewBox (up from
  // 700x520) that came with the bigger pyramid hex size, so the
  // consolidated board keeps using the full available height rather than
  // sitting small in the upper portion of a now-taller board area.
  const cx = 350, cy = 320;
  const petalCount = Math.max(0, Math.min(6, n - 1));
  const slots = SLOT_ANGLES_DEG.slice(0, petalCount);

  // Find the largest hex size that keeps every tile fully inside the
  // board's drawable area, so a consolidated board with fewer tiles grows
  // to fill the same space rather than shrinking into a small cluster.
  const marginX = 40, marginY = 30;
  const maxHalfW = 350 - marginX, maxHalfH = cy - marginY;
  let maxSize = 150; // a generous ceiling; a lone tile shouldn't dominate everything
  slots.forEach(deg => {
    const rad = deg * Math.PI / 180;
    const ux = Math.sin(rad) * Math.sqrt(3);
    const uy = -Math.cos(rad) * Math.sqrt(3);
    const halfWNeeded = Math.abs(ux) + 1;
    const halfHNeeded = Math.abs(uy) + 1;
    maxSize = Math.min(maxSize, maxHalfW / halfWNeeded, maxHalfH / halfHNeeded);
  });
  const size = Math.max(58, Math.floor(maxSize));

  const positions = [[cx, cy]];
  const neighborDist = Math.sqrt(3) * size;
  slots.forEach(deg => {
    const rad = deg * Math.PI / 180;
    positions.push([cx + neighborDist * Math.sin(rad), cy - neighborDist * Math.cos(rad)]);
  });
  return { positions, size };
}

let tileEls = [];
let tileLabelEls = [];
let tileOwner = {};        // node -> current owner player_id
let playerDomain = {};     // player_id -> current domain name (changes with conquest/tax)
let playerProfession = {}; // player_id -> real-world job, fixed for the run
let playerKingdom = {};    // player_id -> flavor kingdom name, fixed for the run
// The domain a player was originally drafted into, Section 8's "chosen
// expertise" -- distinct from playerDomain above, which tracks whatever
// they currently hold and can drift away from this as the show goes on.
// Set once on draw_assignment and never touched again.
let playerStartDomain = {};
// player_id -> current consecutive-win count, from duel_result's
// winner_streak field. Only meaningful for whoever most recently won as
// the winner; not cleared for eliminated players, but they're never shown
// again so that's harmless.
let playerStreak = {};
// player_id -> temperament_label ("Cautious"/"Balanced"/"Aggressive"), from
// draw_assignment. Fixed for the whole run, folded into the expertise line
// in the duel badge so the audience can see a contestant's playing style
// alongside their profession, not just their win/loss record.
let playerTemperament = {};
// player_id -> the local Ollama model backing this player's live decisions
// (see engine/ollama_agent.py). Fixed for the whole run, from draw_assignment.
let playerModel = {};
// player_id -> a running tally of {wins, correct, incorrect, passed,
// totalCorrectSeconds}, built up purely from events already on the wire
// (duel_turn's outcome/seconds_used, duel_result's winner_id) -- no engine
// changes needed, this is just client-side bookkeeping over data that was
// already streaming. Shown compactly on the badge and in full for the
// champion at the finale.
let playerStats = {};
function ensureStats(id) {
  if (!playerStats[id]) playerStats[id] = { wins: 0, correct: 0, incorrect: 0, passed: 0, totalCorrectSeconds: 0 };
  return playerStats[id];
}
function formatStatsLine(id) {
  const s = playerStats[id];
  if (!s || (s.correct + s.incorrect + s.passed) === 0) return '';
  const attempts = s.correct + s.incorrect;
  const pct = attempts ? Math.round((s.correct / attempts) * 100) : 0;
  const avg = s.correct ? (s.totalCorrectSeconds / s.correct).toFixed(1) : '—';
  return `\u{1F4CA} ${s.wins}W · ${pct}% · ${avg}s avg`;
}

// Board display width grew to 1100px (from 860) while the SVG's internal
// viewBox stayed 700x520, so everything drawn in it -- tiles and text
// alike -- already renders about 1.27x bigger just from that change. These
// base sizes are tuned on top of that so the smallest (longest-name) tile
// label still renders at least as large as the "Player N" name text in a
// duel badge (~1.25em / ~20px) once the viewBox-to-screen scale is applied.
function fontSizeForLabel(text) {
  if (!text) return 17;
  if (text.length <= 6) return 17;
  if (text.length <= 10) return 15;
  if (text.length <= 14) return 13.5;
  return 12.5;
}

function renderBoard(layout) {
  tileLayerEl.innerHTML = '';
  tileOwner = {};
  tileLabelEls = [];
  tileEls = layout.positions.map((pos, idx) => {
    const poly = document.createElementNS(SVG_NS, 'polygon');
    poly.setAttribute('points', hexPoints(pos[0], pos[1], layout.size));
    poly.setAttribute('class', 'board-tile empty');
    poly.dataset.node = idx;
    tileLayerEl.appendChild(poly);

    const domainEl = document.createElementNS(SVG_NS, 'text');
    domainEl.setAttribute('x', pos[0]);
    domainEl.setAttribute('y', pos[1] - 6);
    domainEl.setAttribute('text-anchor', 'middle');
    domainEl.setAttribute('class', 'tile-label');
    domainEl.setAttribute('font-size', '17');
    tileLayerEl.appendChild(domainEl);

    const ownerEl = document.createElementNS(SVG_NS, 'text');
    ownerEl.setAttribute('x', pos[0]);
    ownerEl.setAttribute('y', pos[1] + 9);
    ownerEl.setAttribute('text-anchor', 'middle');
    ownerEl.setAttribute('class', 'tile-label owner');
    ownerEl.setAttribute('font-size', '14');
    tileLayerEl.appendChild(ownerEl);

    // A small 8-bit face, hidden until a player actually claims this tile
    // (fillTile/captureTiles populate and reveal it).
    const faceSize = Math.max(16, Math.min(26, layout.size * 0.34));
    const faceObj = document.createElementNS(SVG_NS, 'foreignObject');
    faceObj.setAttribute('x', pos[0] - faceSize / 2);
    faceObj.setAttribute('y', pos[1] + 14);
    faceObj.setAttribute('width', faceSize);
    faceObj.setAttribute('height', faceSize);
    faceObj.setAttribute('class', 'tile-face-obj');
    faceObj.style.display = 'none';
    const faceDiv = document.createElement('div');
    faceObj.appendChild(faceDiv);
    tileLayerEl.appendChild(faceObj);

    tileLabelEls[idx] = { domainEl, ownerEl, faceObj, faceDiv };
    return poly;
  });
}

// Phase 1 of the draw: the domain is named and "waits" on its tile before
// anyone is placed there. No color, no owner tag yet.
function revealDomainOnTile(node, domainName) {
  const el = tileEls[node];
  const labels = tileLabelEls[node];
  if (!el || !labels) return;
  labels.domainEl.textContent = domainName;
  labels.domainEl.setAttribute('font-size', fontSizeForLabel(domainName));
  el.classList.add('pending');
  void el.getBBox();
}

function labelTile(node, playerId) {
  const labels = tileLabelEls[node];
  if (!labels) return;
  const domainName = playerDomain[playerId] || '';
  labels.domainEl.textContent = domainName;
  labels.domainEl.setAttribute('font-size', fontSizeForLabel(domainName));
  labels.ownerEl.textContent = 'P' + (playerId + 1);
  if (labels.faceDiv) {
    labels.faceDiv.innerHTML = buildPixelFace(playerId);
    labels.faceObj.style.display = '';
  }
}

// A player's domain can change without their territory changing at all
// (inheriting a conquered domain, or a domain tax swap), so every tile
// they already hold needs its label refreshed too, not just a newly won one.
function relabelPlayerTiles(playerId) {
  Object.keys(tileOwner).forEach(nodeStr => {
    const node = parseInt(nodeStr, 10);
    if (tileOwner[node] === playerId) labelTile(node, playerId);
  });
}

// Phase 2 of the draw (and every later capture): a player is placed on
// the tile and takes on whatever domain is already named there.
function fillTile(node, playerId) {
  const el = tileEls[node];
  if (!el) return;
  tileOwner[node] = playerId;
  el.classList.remove('pending');
  el.setAttribute('fill', '#' + playerColor(playerId));
  el.classList.remove('empty');
  el.classList.remove('pop');
  void el.getBBox();
  el.classList.add('pop');
  labelTile(node, playerId);
}

function captureTiles(nodes, playerId) {
  const color = '#' + playerColor(playerId);
  nodes.forEach(node => {
    const el = tileEls[node];
    if (!el) return;
    tileOwner[node] = playerId;
    el.setAttribute('fill', color);
    el.classList.remove('capture');
    void el.getBBox();
    el.classList.add('capture');
    labelTile(node, playerId);
  });
}

async function rebuildBoardAfterScramble(d) {
  boardSvg.style.transition = 'opacity .4s ease';
  boardSvg.style.opacity = '0';
  await sleep(420);
  renderBoard(circularPositions(d.board_size));
  Object.keys(d.new_owner).forEach(nodeStr => {
    fillTile(parseInt(nodeStr, 10), d.new_owner[nodeStr]);
  });
  boardSvg.style.opacity = '1';
  await sleep(300);
}

renderBoard(pyramidPositions());

// --- 8-bit generated faces: a small, blocky retro portrait built at
// runtime per player, deterministic from their id, so the same player
// always looks the same across a whole show and different players
// reliably look different from each other. No real art asset exists for
// any of these personas (they're generated fresh every show), so this is
// entirely procedural: a fixed handful of chunky rectangles, colored and
// arranged by a seeded pseudo-random pick from small feature palettes. ---
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const FACE_SKIN = ['#f4c9a0', '#e0ac69', '#c68642', '#8d5524', '#ffdbac', '#f0b088'];
const FACE_HAIR = ['#2b1b0e', '#5a3825', '#8b5a2b', '#d4af37', '#1a1a1a', '#7a2e2e', '#e8e8e8'];
const FACE_EYE = ['#2a2a2a', '#2a5a8a', '#3a7a4a', '#6b3fa0'];
const FACE_ACCENT = ['#e05fb0', '#4fa3d1', '#58d18f', '#f5c542', '#e0555f', '#a996c9'];

function buildPixelFace(playerId) {
  const rnd = mulberry32(playerId * 7919 + 104729);
  const pick = (arr) => arr[Math.floor(rnd() * arr.length)];
  const skin = pick(FACE_SKIN);
  const hair = pick(FACE_HAIR);
  const eye = pick(FACE_EYE);
  const accent = pick(FACE_ACCENT);
  const hairStyle = Math.floor(rnd() * 4);  // 0 short crop, 1 mohawk, 2 side-swept, 3 capped
  const mouthStyle = Math.floor(rnd() * 3); // 0 smile, 1 flat, 2 open/surprised
  const hasGlasses = rnd() < 0.32;

  const S = 8; // each grid unit is an 8x8 square in a 64x64 viewBox
  const rects = [];
  const add = (col, row, w, h, fill, cls, extraStyle) =>
    rects.push(`<rect x="${col * S}" y="${row * S}" width="${w * S}" height="${h * S}" fill="${fill}"${cls ? ` class="${cls}"` : ''}${extraStyle ? ` style="${extraStyle}"` : ''}/>`);

  add(1, 1, 6, 6, skin); // head block

  if (hairStyle === 0) add(1, 0, 6, 1.5, hair);
  else if (hairStyle === 1) add(3, 0, 2, 2, hair);
  else if (hairStyle === 2) { add(1, 0, 6, 1, hair); add(1, 1, 1.5, 3, hair); }
  else { add(1, 0.5, 6, 1.5, hair); add(0.5, 1.5, 7, 0.8, accent); }

  // Eyes and mouth get their own class plus a randomized (but stable per
  // player) blink timing, so faces aren't frozen -- Section 4/8: "faces
  // sell" reads better with a little life in them, and de-synced timing
  // across the two players on stage keeps it from looking robotic.
  const blinkDelay = (rnd() * 4).toFixed(2);
  const blinkDur = (3.4 + rnd() * 2).toFixed(2);
  const eyeStyle = `animation-delay:${blinkDelay}s;animation-duration:${blinkDur}s;`;
  add(2, 3.2, 1, 1, eye, 'face-eye', eyeStyle);
  add(5, 3.2, 1, 1, eye, 'face-eye', eyeStyle);

  if (mouthStyle === 0) add(2.5, 5, 3, 0.6, '#7a2e2e', 'face-mouth');
  else if (mouthStyle === 1) add(2.5, 5, 3, 0.5, '#5a2020', 'face-mouth');
  else add(3, 4.8, 2, 1.2, '#3a1414', 'face-mouth');

  if (hasGlasses) {
    rects.push(`<rect x="${1.6 * S}" y="${3 * S}" width="${1.8 * S}" height="${1.6 * S}" fill="none" stroke="#222" stroke-width="2"/>`);
    rects.push(`<rect x="${4.6 * S}" y="${3 * S}" width="${1.8 * S}" height="${1.6 * S}" fill="none" stroke="#222" stroke-width="2"/>`);
    rects.push(`<rect x="${3.4 * S}" y="${3.6 * S}" width="${1.2 * S}" height="${0.3 * S}" fill="#222"/>`);
  }

  return `<svg viewBox="0 0 64 64" width="100%" height="100%" shape-rendering="crispEdges">${rects.join('')}</svg>`;
}

// --- The Challenge Stage: live duel animation ---
// Turns are pre-simulated, but the on-screen clock now counts down in real
// time: one real second of animation per one simulated clock second, so
// what the audience watches tick by actually matches the seconds_used the
// engine recorded, not a compressed or stretched stand-in for it. Display
// is whole seconds only, ticking down integer by integer.
// One real second of animation per simulated second, per Scott's original
// real-time request -- but capped at 2.5s so a single slow turn (the
// engine's own range tops out at 4.5s for an answer) never visibly drags;
// the relative fast/slow feel between turns is preserved, just the worst
// case is bounded.
function tickDuration(secondsUsed) {
  const ms = Math.min(2500, Math.max(120, secondsUsed * 1000));
  return ms / FF_LEVELS[ffLevelIndex];
}
// A live turn's seconds_used is real time a live Ollama call already spent
// server-side -- the audience already "watched" that wait in the form of
// the gap before this event arrived (same principle as agent_thinking).
// This is just a short, fixed flourish for the clock to visibly land on
// its new value, not a real-time replay of the wait -- see playDuelTurn.
const LIVE_TURN_ANIM_MS = 400;

// Countdown display always rounds UP (ceil), never to nearest and never
// down: with plain rounding, a true remaining value like 0.3s displayed as
// "0" while the player is still legitimately alive (the engine's own
// elimination check uses the real, unrounded value and only fires at or
// below true zero) -- that mismatch made a correct answer "at 0" look like
// it should have ended the duel when the real clock hadn't actually
// reached zero yet. Ceiling means the display can only ever read 0 once
// the true value truly has hit zero (or below).
function displaySeconds(val) {
  return Math.ceil(Math.max(0, val));
}

async function animateClock(clockEl, fromVal, toVal, ms) {
  const clampedTo = Math.max(0, toVal);
  const clampedFrom = Math.max(0, fromVal);
  const span = clampedFrom - clampedTo;
  const start = Date.now();
  return new Promise(resolve => {
    // Driven by setInterval + Date.now() elapsed time, NOT
    // requestAnimationFrame: rAF is fully suspended the instant a tab isn't
    // the visible/focused one (backgrounded, minimized, switched away from,
    // a second monitor stealing focus) -- with nothing else driving the
    // per-frame update, the clock text sat frozen on its OLD value for the
    // entire animation, then snapped straight to the final value the moment
    // the old setTimeout backstop fired. The internal clock value was
    // always correct; only the visual countdown looked broken -- exactly
    // Scott's report ("internal clocks may be working but the visual
    // aspect is not... it used to work, at least visually") and confirmed
    // directly: instrumented a real run and watched the displayed number
    // sit at 25 for the entire ~2.5s turn, then jump straight to 21 with no
    // steps in between. setInterval is only throttled when backgrounded
    // (never suspended outright), and computing the displayed value from
    // real elapsed wall-clock time (not a tick count) means each player's
    // clock keeps counting down on its own, independent of the other
    // player's turn or whether the tab has focus -- a real chess clock,
    // not an animation that can be starved.
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      clearInterval(intervalId);
      clockEl.textContent = String(displaySeconds(clampedTo));
      resolve();
    };
    const tick = () => {
      if (done) return;
      const t = Math.min(1, (Date.now() - start) / ms);
      const val = Math.max(0, clampedFrom - span * t);
      clockEl.textContent = String(displaySeconds(val));
      if (t >= 1) finish();
    };
    const intervalId = setInterval(tick, 100);
    tick();
  });
}

let stageChallengerId = null;
let stageDefenderId = null;
// Read by hostPreduelQuestion (see the pre_duel_intro handler) to name the
// domain in the host's directed question -- set fresh each duel in openStage.
let stageTestedDomain = null;
// Set by the spotlight_chosen handler whenever RNGG actually picks a NEW
// challenger, consumed (and cleared) by openStage's challenger-face setup
// right after -- spotlight_chosen only fires for a genuine new pick, never
// when a winner just continues pushing (they're already on stage, already
// spotlighted, no walk-up needed), so this is exactly how openStage tells
// the two cases apart despite challenge_declared's payload looking
// identical either way.
let pendingSpotlightToddlePid = null;
// Territory each side holds the moment this duel STARTS, captured before
// any tiles can change hands -- lets celebrateDuelWinner recognize a real
// underdog win (see isUpset there) instead of the old domain-based
// definition, which fired constantly by mid-show (a defender's current
// domain drifts away from their original draft pick via conquest/tax all
// the time, so "different from your starting domain" wasn't actually rare
// or visible to the audience as anything meaningful).
let stageChallengerTerritory = 0;
let stageDefenderTerritory = 0;
function countTerritory(playerId) {
  return Object.values(tileOwner).filter(owner => owner === playerId).length;
}
let clockState = { left: BASE_CLOCK, right: BASE_CLOCK };
// Tracks whatever prompt is currently on screen so the reveal animation
// only replays when the image actually changes (a fresh question after a
// pass, or the fresh image the other player gets after a correct answer),
// never on a plain wrong answer, which by design keeps the same image up
// for the same player to try again, Section 4.
let lastDuelPrompt = null;
// The countdown/music used to fire at the end of openStage() itself, but
// now two pre_duel_intro events (challenger, then defender) stream in
// between the badge setup and the actual first duel_turn -- firing the
// countdown early would play it out from underneath those intro lines.
// Set true here, consumed (and cleared) by the first duel_turn of THIS
// duel, so it fires exactly once, after both sides have had their say.
let duelCountdownPending = false;

async function openStage(d) {
  stageChallengerId = d.challenger_id;
  stageDefenderId = d.defender_id;
  stageTestedDomain = d.tested_domain;
  stageChallengerTerritory = countTerritory(d.challenger_id);
  stageDefenderTerritory = countTerritory(d.defender_id);
  nameLeft.textContent = playerLabel(d.challenger_id);
  nameRight.textContent = playerLabel(d.defender_id);
  faceLeft.innerHTML = buildPixelFace(d.challenger_id);
  faceRight.innerHTML = buildPixelFace(d.defender_id);
  // Toddle-in only for a challenger RNGG genuinely just called up fresh
  // (pendingSpotlightToddlePid was set by the spotlight_chosen handler and
  // matches THIS challenger) -- a winner who's continuing to push is
  // already standing there and shouldn't visibly "walk up" a second time.
  // Consumed here, once, so it can never accidentally replay on a later
  // duel this same player continues into.
  faceLeft.classList.remove('toddle-in');
  if (pendingSpotlightToddlePid === d.challenger_id) {
    void faceLeft.offsetWidth; // force reflow so the animation replays
    faceLeft.classList.add('toddle-in');
  }
  pendingSpotlightToddlePid = null;
  // Profession plus playing-style temperament (Cautious/Balanced/Aggressive),
  // folded onto one line so the audience sees who someone IS (job) right
  // alongside how they PLAY (style) at a glance, not just their win/loss
  // record via the streak badge further down.
  expertiseLeft.textContent = formatExpertiseLine(d.challenger_id);
  expertiseRight.textContent = formatExpertiseLine(d.defender_id);
  modelLeft.textContent = playerModel[d.challenger_id] ? '\u{1F9E0} ' + playerModel[d.challenger_id] : '';
  modelRight.textContent = playerModel[d.defender_id] ? '\u{1F9E0} ' + playerModel[d.defender_id] : '';
  statsLeft.textContent = formatStatsLine(d.challenger_id);
  statsRight.textContent = formatStatsLine(d.defender_id);
  startDomainLeft.textContent = playerStartDomain[d.challenger_id] ? 'Expertise: ' + playerStartDomain[d.challenger_id] : '';
  startDomainRight.textContent = playerStartDomain[d.defender_id] ? 'Expertise: ' + playerStartDomain[d.defender_id] : '';
  domainLeft.textContent = playerDomain[d.challenger_id] ? 'Holds: ' + playerDomain[d.challenger_id] : '';
  domainRight.textContent = playerDomain[d.defender_id] ? 'Holds: ' + playerDomain[d.defender_id] : '';
  // Consecutive-win streak: only worth showing once it's 2+ in a row, per
  // Scott's ask to actually surface this stat on the badge rather than
  // only implying it via the (less frequent) advantage/bonus events.
  const leftStreak = playerStreak[d.challenger_id] || 0;
  const rightStreak = playerStreak[d.defender_id] || 0;
  streakLeft.textContent = leftStreak >= 2 ? `\u{1F525} ${leftStreak}-win streak` : '';
  streakLeft.classList.toggle('show', leftStreak >= 2);
  streakRight.textContent = rightStreak >= 2 ? `\u{1F525} ${rightStreak}-win streak` : '';
  streakRight.classList.toggle('show', rightStreak >= 2);
  duelDomainTag.textContent = 'Domain on the line: ' + d.tested_domain;
  // Left blank rather than a placeholder line: the countdown should be the
  // first thing that appears in this panel, not a "the image comes up
  // first" caption that then gets replaced by the countdown a moment later.
  duelImage.textContent = '';
  lastDuelPrompt = null; // a fresh duel always reveals its first image as new
  duelGuess.classList.remove('show', 'correct', 'wrong', 'passed');
  duelSayLabel.textContent = 'They say:';
  duelGuessText.textContent = '—';
  duelAnswerText.textContent = '—';
  // Each side's clock actually starts at 25s, +5 if a banked bonus is
  // being spent this duel, matching the engine exactly rather than
  // assuming a flat number for the very first tick. Always trust what this
  // duel's own event says (d.base_clock) rather than the fixed JS constant
  // below, which is only a last-resort fallback for an event that somehow
  // omits it.
  const duelBaseClock = d.base_clock || BASE_CLOCK;
  const leftStart = duelBaseClock + (d.challenger_using_bonus ? BONUS_SECONDS : 0);
  const rightStart = duelBaseClock + (d.defender_using_bonus ? BONUS_SECONDS : 0);
  clockState = { left: leftStart, right: rightStart };
  clockLeft.textContent = String(leftStart);
  clockRight.textContent = String(rightStart);
  playerLeft.classList.remove('active', 'flash-correct', 'flash-wrong', 'flash-pass', 'victory');
  playerRight.classList.remove('active', 'flash-correct', 'flash-wrong', 'flash-pass', 'victory');
  // Tint each duel box to match that player's own board territory color, AND
  // give it a solid accent border in that same color -- the old 0.22-alpha
  // background wash alone read as barely-there against the dark theme and
  // didn't actually look like "the same color" as their bold, full-opacity
  // board tile. The border carries the real color match; the background
  // stays a lighter wash so badge text is still readable over it.
  playerLeft.style.setProperty('--player-accent', '#' + playerColor(d.challenger_id));
  playerRight.style.setProperty('--player-accent', '#' + playerColor(d.defender_id));
  playerLeft.style.background = hexToRgba(playerColor(d.challenger_id), 0.3);
  playerRight.style.background = hexToRgba(playerColor(d.defender_id), 0.3);
  bonusLeft.classList.toggle('show', !!d.challenger_using_bonus);
  bonusRight.classList.toggle('show', !!d.defender_using_bonus);
  duelStage.classList.add('active');
  duelStage.scrollIntoView({ behavior: 'smooth', block: 'center' });
  sayHost('preduel');
  // Countdown/music are deferred to the first duel_turn event -- see
  // duelCountdownPending -- so the two pre_duel_intro lines that stream in
  // next (challenger, then defender) get their moment first.
  duelCountdownPending = true;
}

// A quick burst of plausible-but-wrong guesses, flashing by while the clock
// ticks -- replaces the old static "is thinking..." placeholder per Scott's
// note that a real contestant blurts out guesses rather than sitting there
// quietly. Purely cosmetic: cycles through the engine-supplied distractor
// pool for this exact question (duel.py's _pick_distractors, real other
// answers from the same domain, never the actual answer or the eventual
// real guess), retriggering a quick pop animation on each flip so it reads
// as rapid-fire rather than a slow crossfade. Falls back to the old calm
// "is thinking..." beat if a question genuinely has no distractors to draw
// from (a domain with only one question, essentially never in practice).
// Fisher-Yates on a copy -- never mutates the shared distractors array
// (duel.py hands the SAME list back across repeated attempts on one
// question, so mutating it here would corrupt later turns/players too).
function shuffleCopy(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startRapidFireGuesses(playerId, distractors, totalMs) {
  if (!distractors || !distractors.length) {
    duelSayLabel.textContent = '';
    duelGuessText.textContent = playerLabel(playerId) + ' is thinking…';
    duelGuess.classList.add('thinking');
    return null;
  }
  duelSayLabel.textContent = playerLabel(playerId) + ' blurts:';
  duelGuess.classList.add('rapidfire');
  // Shuffled once per turn and never repeated within this one player's
  // burst -- Scott: "blurts can't be repeats of the same answer by the
  // same player. the other player could blurt the same answer. but we are
  // repeating a lot." The old version cycled distractors[i % length],
  // which guaranteed a repeat the moment the burst ran past the pool size.
  // Paced to spread evenly across the turn's actual duration (totalMs)
  // instead of a fixed interval, so a longer/more-hesitant turn shows more
  // (still unique) guesses rather than just looping the same handful
  // faster; once every unique option has been shown, it holds on the last
  // one rather than wrapping back to repeat.
  const order = shuffleCopy(distractors);
  const interval = Math.max(300, Math.min(650, totalMs / order.length));
  let i = 0;
  const flick = () => {
    duelGuessText.textContent = order[i] + '?';
    duelGuessText.style.animation = 'none';
    void duelGuessText.offsetWidth; // force reflow so the pop replays every flick
    duelGuessText.style.animation = '';
    i++;
  };
  flick();
  const timerId = setInterval(() => {
    if (i >= order.length) { clearInterval(timerId); return; }
    flick();
  }, interval);
  return timerId;
}

function stopRapidFireGuesses(timerId) {
  if (timerId) clearInterval(timerId);
  duelGuess.classList.remove('rapidfire', 'thinking');
}

async function playDuelTurn(d) {
  const isChallenger = d.player_id === stageChallengerId;
  const activeEl = isChallenger ? playerLeft : playerRight;
  const idleEl = isChallenger ? playerRight : playerLeft;
  const clockEl = isChallenger ? clockLeft : clockRight;
  const clockKey = isChallenger ? 'left' : 'right';

  activeEl.classList.add('active');
  idleEl.classList.remove('active');

  // A plain wrong answer keeps the exact same image up for the same player
  // to try again, Section 4, so the reveal animation should only replay
  // when the prompt actually changed (a pass discarding it for a new one,
  // or a fresh image handed to the other player after a correct answer),
  // never on every single turn regardless of whether anything changed.
  if (d.prompt !== lastDuelPrompt) {
    duelImage.style.animation = 'none';
    // Force reflow so the reveal animation replays for the new image.
    void duelImage.offsetWidth;
    duelImage.style.animation = '';
  }
  duelImage.textContent = d.prompt;
  lastDuelPrompt = d.prompt;
  // The answer sought reveals right alongside the image, same moment,
  // ahead of the clock tick: the audience gets to know it before the
  // player answers, not after.
  duelAnswerText.textContent = d.answer;

  // A burst of rapid-fire guesses flashing by while the clock ticks,
  // rather than a static "is thinking..." label sitting there for the
  // whole stretch -- Scott's note that a real contestant blurts out
  // guesses instead of quietly waiting. Runs concurrently with the clock
  // animation below (started first, stopped once the clock catches up),
  // cycling through the engine's per-question distractor pool; falls back
  // to the old calm "is thinking..." beat if this question has no real
  // distractors to draw from.
  duelGuess.classList.remove('correct', 'wrong', 'passed');
  duelGuess.classList.add('show');

  const fromVal = clockState[clockKey];
  const toVal = d.clock_remaining;
  // d.live means d.seconds_used is REAL wall-clock time a live Ollama call
  // already spent server-side, before this event ever streamed out --
  // re-animating the clock over that same duration here would double the
  // real wait the audience just sat through. Scripted turns don't have
  // that problem (seconds_used there is simulated, never real elapsed
  // time), so they keep the full tickDuration animation exactly as before.
  const animMs = d.live ? LIVE_TURN_ANIM_MS / FF_LEVELS[ffLevelIndex] : tickDuration(d.seconds_used);
  // Computed before starting the blurt burst (not after, as before) so it
  // can pace a repeat-free cycle through the actual turn duration instead
  // of a fixed interval.
  const rapidFireTimer = startRapidFireGuesses(d.player_id, d.distractors, animMs);
  await animateClock(clockEl, fromVal, toVal, animMs);
  clockState[clockKey] = toVal;

  stopRapidFireGuesses(rapidFireTimer);
  duelSayLabel.textContent = playerLabel(d.player_id) + ' says:';

  if (d.outcome === 'passed') {
    duelGuessText.textContent = 'passes…';
    duelGuess.classList.add('show', 'passed');
    await sleep(300);
    activeEl.classList.add('flash-pass');
    await sleep(360);
    activeEl.classList.remove('flash-pass');
  } else {
    duelGuessText.textContent = d.guess;
    duelGuess.classList.add('show', d.correct ? 'correct' : 'wrong');
    await sleep(250);

    activeEl.classList.add(d.correct ? 'flash-correct' : 'flash-wrong');
    await sleep(d.correct ? 420 : 320);
    activeEl.classList.remove('flash-correct', 'flash-wrong');
  }

  // Real-time audience texture: a chance for a short crowd reaction (and,
  // less often, a catty aside from another player watching) right after
  // this turn resolves, matching Scott's request that onlookers react in
  // the moment rather than only between duels.
  maybeReactToTurn(d);
}

// A brief victory beat on the Challenge Stage itself, before it closes,
// so the moment a duel resolves gets its own visible celebration rather
// than jumping straight from the last answer to the next card. An "upset"
// -- the winner's own chosen expertise domain isn't the one they just
// fought and won on -- gets extra treatment: a brighter fanfare, a quick
// confetti burst, an "UPSET WIN!" tag instead of the plain one, and a
// longer hold, since an underdog moment is worth more than a routine win.
//
// Takes the whole duel_result payload now (not just winnerId), since a
// timeout ending gets its own held beat first -- Scott's note that the cut
// from "clock hits zero" straight to "WINS!" happened too fast to actually
// register. The previous turn's own reveal/flash sleeps (playDuelTurn)
// only added ~570-670ms before this function even started, and this
// function used to jump straight to the winner tag with no pause of its
// own, so the elimination and the celebration were basically simultaneous.
// Now, on a real timeout, the loser's clock/box gets its own flash and a
// low buzzer tone and a genuine ~950ms hold, so "time's up" is a beat the
// audience actually sees before the win banner takes over. The
// question-cap tiebreak (the rare fallback ending) skips this beat since
// there's no dramatic "hit zero" moment to hold on for that case.
async function celebrateDuelWinner(d) {
  stopDramaMusic();
  const winnerId = d.winner_id;
  const isChallenger = winnerId === stageChallengerId;
  const winEl = isChallenger ? playerLeft : playerRight;
  const loseEl = isChallenger ? playerRight : playerLeft;
  const loserClockEl = isChallenger ? clockRight : clockLeft;
  const winnerTagEl = isChallenger ? winnerTagLeft : winnerTagRight;

  if (d.reason === 'timeout') {
    loserClockEl.textContent = '0';
    loseEl.classList.add('flash-wrong');
    playTimeUpBuzzer();
    await sleep(750);
    loseEl.classList.remove('flash-wrong');
    await sleep(200);
  }

  // A real underdog win: the winner held meaningfully LESS territory than
  // the loser going into this duel -- visible on the board, and rare enough
  // to actually mean something. (Previously this compared the winner's
  // ORIGINAL draft domain to the domain under test, which drifts away from
  // a player's starting pick constantly by mid-show via conquest/tax, so it
  // fired on most duels for no reason a viewer could see -- Scott's report.)
  const winnerTerritory = isChallenger ? stageChallengerTerritory : stageDefenderTerritory;
  const loserTerritory = isChallenger ? stageDefenderTerritory : stageChallengerTerritory;
  const isUpset = loserTerritory - winnerTerritory >= 2;
  // A nail-biter: the clocks were nearly even when this one resolved, a
  // different kind of drama than an upset (which is about territory size,
  // not margin) -- worth its own host reaction rather than the plain default.
  const isClose = d.clocks_remaining && !isUpset &&
    Math.abs((d.clocks_remaining[d.winner_id] ?? 0) - (d.clocks_remaining[d.loser_id] ?? 0)) < 3;

  if (isUpset) {
    winnerTagEl.innerHTML = '&#127881; UPSET WIN!';
    playUpsetFanfare();
    spawnConfetti(40);
    sayHost('winUpset');
  } else {
    winnerTagEl.innerHTML = '&#127942; WINS!';
    playDuelCompleteSound();
    sayHost(isClose ? 'winClose' : 'win');
  }

  winEl.classList.add('victory');
  await sleep(isUpset ? 2500 : 1900); // upsets get an even longer beat
  winEl.classList.remove('victory');
}

async function closeStage() {
  await sleep(300);
  duelStage.classList.remove('active');
  await sleep(350);
}

const THINKING_LABEL = { target: 'choosing a target', continue: 'deciding whether to push on', tax: 'choosing a domain tax target', intro: 'weighing in on tonight’s domain' };

// A growing queue fed by the streaming /api/run-show response (see
// startShow) -- events can now take real, variable time to produce (a
// player's live Ollama call), so the frontend can no longer just fetch one
// finished array and iterate it. items is the same array runShowPlayback
// reads by index, so it doubles as the accumulated history the finale event
// searches back over (events.find/.filter below), exactly like the old
// pre-fetched array did.
class EventQueue {
  constructor() { this.items = []; this.done = false; this._resolvers = []; }
  push(item) { this.items.push(item); this._flush(); }
  finish() { this.done = true; this._flush(); }
  _flush() { const r = this._resolvers; this._resolvers = []; r.forEach(fn => fn()); }
  async waitFor(i) {
    while (this.items.length <= i && !this.done) {
      await new Promise(resolve => this._resolvers.push(resolve));
    }
  }
}

// Crowd lines for a genuinely slow live decision -- the audience noticing
// the real wait, not a scripted one. Kept separate from GOSSIP_TEMPLATES
// (which is always attributed to a specific other player) since this is a
// general room reaction to the model itself taking its time.
const STILL_WAITING_LINES = [
  (model) => `The room waits on ${model}...`,
  (model) => `Still thinking it over, apparently.`,
  (model) => `${model} is really weighing this one.`,
  (model) => `Someone's taking their sweet time.`,
  (model) => `${model} is really making us wait tonight.`,
  (model) => `You could hear a pin drop out there.`,
  (model) => `Come on, ${model}, any day now.`,
  (model) => `The suspense is doing numbers on this crowd.`,
  (model) => `${model} is deep in thought. Deep.`,
  (model) => `Somebody get this contestant a coffee.`,
];
let stillThinkingTimer = null;

async function runShowPlayback(queue) {
  const events = queue.items;
  for (let i = 0; ; i++) {
    await queue.waitFor(i);
    if (i >= events.length) break; // stream finished, nothing left to play
    const ev = events[i];
    if (ev.type === 'agent_thinking') {
      // The real wait is however long the NEXT event takes to arrive over
      // the stream -- nothing to sleep for here, just surface who's live.
      agentThinkingEl.textContent = `\u{1F9E0} ${ev.data.model} is ${THINKING_LABEL[ev.data.decision] || 'deciding'}…`;
      agentThinkingEl.classList.add('show');
      clearTimeout(stillThinkingTimer);
      // Only worth a reaction if the wait is genuinely still going after a
      // few real seconds -- guarded so this can never fire once the
      // decision has actually landed and the indicator's been cleared.
      stillThinkingTimer = setTimeout(() => {
        if (!agentThinkingEl.classList.contains('show')) return;
        bounceAmphitheater(5);
        const line = STILL_WAITING_LINES[Math.floor(Math.random() * STILL_WAITING_LINES.length)];
        addChatterLine(line(ev.data.model), 'audience', 'Crowd');
        if (Math.random() < 0.5) sayHost('stillThinking');
      }, 4000);
      continue;
    }
    if (agentThinkingEl.classList.contains('show')) {
      agentThinkingEl.classList.remove('show');
      clearTimeout(stillThinkingTimer);
    }
    if (ev.type === 'show_start') {
      // Don't reveal a count yet -- no one has actually been placed on
      // the board at this point, so a "players remaining" figure would
      // be describing a cast that doesn't exist on screen yet.
      playersRemainingCount = ev.data.players;
      continue;
    }
    if (ev.type === 'domain_seeded') {
      // Phase 1: the board is set with domains first, one tile at a time,
      // completely independent of who will end up standing where.
      revealDomainOnTile(ev.data.node, ev.data.domain);
      playTileDing();
      await sleep(220);
      continue;
    }
    if (ev.type === 'board_seeded') {
      // A held beat: the board is fully set, before the first contestant
      // drafts a tile. No card, the curtain intro already carried the
      // ceremony framing.
      await sleep(600);
      continue;
    }
    if (ev.type === 'draw_assignment') {
      // Phase 2, Revision 21: a player drafts one of the still-unclaimed
      // tiles and takes on whatever domain is already sitting there.
      // Ceremony pacing is deliberately slower than ordinary events, so
      // each contestant claiming a territory is a beat the audience
      // actually gets to watch, not a blur, with no accompanying text card.
      playerDomain[ev.data.player_id] = ev.data.domain;
      playerProfession[ev.data.player_id] = ev.data.profession;
      playerKingdom[ev.data.player_id] = ev.data.kingdom_name;
      playerStartDomain[ev.data.player_id] = ev.data.domain;
      playerTemperament[ev.data.player_id] = ev.data.temperament_label;
      playerModel[ev.data.player_id] = ev.data.model;
      playerColorNode[ev.data.player_id] = ev.data.node;
      fillTile(ev.data.node, ev.data.player_id);
      playDraftChime();
      await sleep(480);
      if (ev.data.remaining_after === 0) {
        // The full cast is now on the board -- first moment a "players
        // remaining" count actually describes something real.
        updatePlayersRemaining(playersRemainingCount);
      }
      continue;
    }
    if (ev.type === 'spotlight_chosen') {
      // RNGG picking a genuinely NEW challenger -- flagged here so
      // openStage's challenger-face setup knows to play the toddle-in
      // walk-up (see pendingSpotlightToddlePid) instead of just having the
      // face already sitting there. Still shows the existing "Spotlight"
      // card too (cardFor below), this doesn't replace that.
      pendingSpotlightToddlePid = ev.data.player_id;
      const spotlightEl = cardFor(ev);
      if (spotlightEl) {
        stage.appendChild(spotlightEl);
        spotlightEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }
      continue;
    }
    if (ev.type === 'challenge_declared') {
      if (ev.data.challenger_using_bonus) {
        // Told to the host, ahead of the duel: an explicit, held beat so
        // the audience clearly sees this was a pre-committed choice, not
        // something invoked mid-turn.
        const el = card('advantage prize-highlight', 'Bonus Cashed In',
          `${playerLabel(ev.data.challenger_id)} tells the host: cashing in the banked bonus for this duel.`, '&#9889;');
        stage.appendChild(el);
        el.scrollIntoView({ behavior: 'smooth', block: 'end' });
        playBonusCrescendo();
        sayHost('bonus');
        await sleep(800);
      }
      await openStage(ev.data);
      continue;
    }
    if (ev.type === 'pre_duel_intro') {
      // Host intro for BOTH sides, TWO rounds each now (origin domain, then
      // the domain actually being challenged), streamed as its own event
      // per game.py -- shown before the countdown, which duel_turn below
      // is responsible for kicking off once all four have run. A directed
      // host question comes first (see hostPreduelQuestion), held long
      // enough to actually read, THEN the player's answer -- together this
      // is the real 2-way host<->player exchange Scott asked for, now with
      // "several back and forth" per player instead of just one.
      // Both sides get the opponent's name now, not just the defender --
      // Scott's direct-question example asks the CHALLENGER "are you ready
      // to take on Player Y?" too, which needs the defender's name in hand.
      const opponentName = ev.data.role === 'defender' ? playerLabel(stageChallengerId) : playerLabel(stageDefenderId);
      sayHostText(hostPreduelQuestion(ev.data.player_id, ev.data.role, ev.data.phase, stageTestedDomain, opponentName));
      await sleep(1200);
      await showDomainIntro(ev.data.player_id, ev.data.role, ev.data.text);
      continue;
    }
    if (ev.type === 'duel_turn') {
      if (duelCountdownPending) {
        duelCountdownPending = false;
        await sleep(200);
        await playCountdownIntro();
        startDramaMusic();
      }
      const s = ensureStats(ev.data.player_id);
      if (ev.data.outcome === 'correct') { s.correct++; s.totalCorrectSeconds += ev.data.seconds_used; }
      else if (ev.data.outcome === 'incorrect') { s.incorrect++; }
      else if (ev.data.outcome === 'passed') { s.passed++; }
      await playDuelTurn(ev.data);
      continue;
    }
    if (ev.type === 'duel_result') {
      ensureStats(ev.data.winner_id).wins++;
      await celebrateDuelWinner(ev.data);
      // The host/crowd reaction beat runs BEFORE the stage closes, so the
      // two players who just competed are still standing there while the
      // room reacts -- closeStage() used to run first and hide them, so
      // the reaction played out over an already-empty stage (Scott's
      // report: "the host often reacts but the players have gone
      // already").
      await interDuelReactionBeat();
      await closeStage();
      playerDomain[ev.data.winner_id] = ev.data.winner_domain_after;
      playerStreak[ev.data.winner_id] = ev.data.winner_streak;
      captureTiles(ev.data.territory_gained, ev.data.winner_id);
      playTerritoryCaptureSound();
      relabelPlayerTiles(ev.data.winner_id);
      updatePlayersRemaining(playersRemainingCount - 1);
    }
    if (ev.type === 'territory_reassigned') {
      // A leftover, disconnected piece of the loser's old territory that
      // didn't actually touch the winner -- reassigned engine-side to
      // whichever other active player borders it instead, so nobody ends
      // up holding a stray "exclave." Quiet and low-key on purpose: this
      // is bookkeeping, not a duel result, so no fanfare or held pause.
      captureTiles(ev.data.tiles, ev.data.to_id);
      relabelPlayerTiles(ev.data.to_id);
      continue;
    }
    if (ev.type === 'territory_milestone') {
      const el = card('advantage prize-highlight', 'Territory Milestone',
        `${playerLabel(ev.data.player_id)} reaches <b>${ev.data.territory} tiles</b> and banks a <b>${fmtMoney(ev.data.bonus)}</b> milestone bonus.`, '&#128176;');
      stage.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      playBonusCrescendo();
      sayHost('milestone');
      await sleep(700);
      continue;
    }
    if (ev.type === 'advantage_earned') {
      // A held beat: the audience needs a moment to register that this
      // player has just earned a real advantage, before seeing which one
      // they choose to spend it on.
      const el = cardFor(ev);
      if (el) { stage.appendChild(el); el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
      sayHost('advantage');
      await sleep(850);
      continue;
    }
    if (ev.type === 'domain_tax_applied') {
      playerDomain[ev.data.from_id] = ev.data.winner_new_domain;
      playerDomain[ev.data.to_id] = ev.data.target_new_domain;
      relabelPlayerTiles(ev.data.from_id);
      relabelPlayerTiles(ev.data.to_id);
      const el = cardFor(ev);
      if (el) { stage.appendChild(el); el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
      await sleep(700);
      continue;
    }
    if (ev.type === 'time_bonus_banked') {
      const el = cardFor(ev);
      if (el) { stage.appendChild(el); el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
      sayHost('tax');
      await sleep(700);
      continue;
    }
    if (ev.type === 'burst_prize') {
      const el = cardFor(ev);
      if (el) { stage.appendChild(el); el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
      sayHost('burst');
      await sleep(700);
      continue;
    }
    if (ev.type === 'scramble') {
      const el = cardFor(ev);
      if (el) { stage.appendChild(el); el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
      sayHost('scramble');
      await rebuildBoardAfterScramble(ev.data);
      continue;
    }
    if (ev.type === 'finale') {
      const champId = ev.data.champion_id;
      const startAssignment = events.find(e => e.type === 'draw_assignment' && e.data.player_id === champId);
      const personalWins = events.filter(e => e.type === 'duel_result' && e.data.winner_id === champId).length;
      const streaks = events
        .filter(e => e.type === 'advantage_earned' && e.data.player_id === champId)
        .map(e => e.data.streak);
      const extra = {
        startingDomain: startAssignment ? startAssignment.data.domain : null,
        startedOnStage: startAssignment ? startAssignment.data.on_stage : false,
        personalWins,
        longestStreak: streaks.length ? Math.max(...streaks) : 0,
        stats: playerStats[champId] || { wins: 0, correct: 0, incorrect: 0, passed: 0, totalCorrectSeconds: 0 },
        model: playerModel[champId] || (startAssignment ? startAssignment.data.model : null),
      };
      const el = finaleCard(ev.data, extra);
      stage.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      // A second copy (not the same node -- it's still live in the
      // scrolling feed above) goes into the New Game popup, so the winner
      // recap is still there to linger with once that popup takes over
      // attention, rather than needing to scroll back up to see it again.
      overlayFinaleContent.innerHTML = '';
      overlayFinaleContent.appendChild(finaleCard(ev.data, extra));
      sayHost('finale');
      spawnConfetti();
      scheduleNewGamePopup();
      continue;
    }
    if (ev.type === 'continues' || ev.type === 'retreats') {
      // The winner's push/retreat choice, announced as a real beat instead
      // of the quiet card it used to just fall through to below -- Scott:
      // this "is being lost in the action... this part of the game build
      // anticipation for the next bout." Fast on purpose: their actual
      // decision is capped at 15s server-side (CONTINUE_DECISION_TIMEOUT
      // in ollama_agent.py, already elapsed before this event streamed),
      // so what's left here is pure display pacing -- host builds it up,
      // the player explains their choice in the same interview-banner
      // treatment used for the pre-duel interview, host reacts, done.
      const keepGoing = ev.type === 'continues';
      sayHostText(hostContinueBuildup(ev.data.player_id));
      await sleep(1100);
      interviewEl.textContent = `${playerLabel(ev.data.player_id)}: ${ev.data.reason}`;
      interviewBannerEl.classList.add('show');
      await sleep(2200);
      playContinueDecisionSting(keepGoing);
      sayHostText(hostContinueReaction(ev.data.player_id, keepGoing));
      await sleep(1300);
      interviewBannerEl.classList.remove('show');
      const decisionEl = cardFor(ev);
      if (decisionEl) {
        stage.appendChild(decisionEl);
        decisionEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }
      continue;
    }
    const el = cardFor(ev);
    if (el) {
      stage.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    await sleep(el ? 160 : 20);
  }
}

async function startShow() {
  showStarted = true;
  clearTimeout(newGamePopupTimer);
  stopDramaMusic(); // defensive: never carry a lingering loop into a new game
  newGameOverlay.classList.remove('show');
  overlayFinaleContent.innerHTML = ''; // clear any previous champion's recap
  startBtn.disabled = true;

  // The host calls it and the button gets struck to kick things off --
  // Scott's ask for Start to feel like it's actually starting the show,
  // not just quietly vanishing. The whole hero panel then gets pushed away
  // to hand its on-stage spot off to the Challenge Stage once the first
  // duel begins, rather than an unrelated button just disappearing.
  sayHost('letsBegin');
  startBtn.classList.add('slam');
  await sleep(360);
  heroStage.classList.add('pushed');
  await sleep(520);
  heroStage.style.display = 'none'; // hidden for the whole run; New Game brings it back via the end-of-show popup
  stage.innerHTML = '';
  duelStage.classList.remove('active');
  boardSvg.style.opacity = '1';
  renderBoard(pyramidPositions());
  playerDomain = {};
  playerProfession = {};
  playerKingdom = {};
  playerStartDomain = {};
  playerStreak = {};
  playerTemperament = {};
  playerModel = {};
  playerColorNode = {};
  playerStats = {};
  interviewBannerEl.classList.remove('show');
  interviewEl.textContent = '';
  chatterFeedEl.innerHTML = '';
  // Reset the count silently -- it isn't shown again until the draft
  // actually finishes and a real cast exists on the board.
  playersRemainingCount = 13;
  playersRemainingEl.textContent = '';
  sayHost('intro');
  statusEl.textContent = 'Running the draw and simulating the show...';
  agentThinkingEl.classList.remove('show');
  try {
    const queue = new EventQueue();
    // Receiving runs in the background the whole time -- events (including
    // ones that took real, variable time behind a live Ollama call) queue
    // up as they arrive. Kept separate from playback below so events that
    // land during the curtain intro are buffered, not skipped or animated
    // early; queue.waitFor() is what actually paces the playback loop.
    const receiving = (async () => {
      const res = await fetch('/api/run-show', { method: 'POST' });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, idx).trim();
          buf = buf.slice(idx + 1);
          if (line) queue.push(JSON.parse(line));
        }
      }
      queue.finish();
    })();
    await playCurtainIntro();
    statusEl.textContent = '';
    await runShowPlayback(queue);
    await receiving; // surface a network/parse error even if playback already drained the queue
  } catch (err) {
    statusEl.textContent = 'Could not reach the show engine: ' + err;
  } finally {
    startBtn.disabled = false;
  }
}

startBtn.addEventListener('click', startShow);
newGameBtn.addEventListener('click', () => {
  heroStage.style.display = '';
  heroStage.classList.remove('pushed');
  startBtn.classList.remove('slam');
  startShow();
});
muteBtn.addEventListener('click', toggleMute);
ffBtn.addEventListener('click', () => {
  ffLevelIndex = (ffLevelIndex + 1) % FF_LEVELS.length;
  const level = FF_LEVELS[ffLevelIndex];
  ffBtn.classList.toggle('active', level > 1);
  ffBtn.textContent = level > 1 ? `\u{23E9} Fast Forward ${level}x` : '\u{23E9} Fast Forward';
});
</script>
</body>
</html>
